# Configuração Nginx para desenvolvimento
#
# Diferença face à config de produção (default.conf):
#   - Activa proxy para hot reload do Next.js (_next/webpack-hmr)
#   - Sem optimizações de cache agressivas
#   - Logs mais detalhados para debug

server {
    listen 80;
    server_name localhost;
    # Redireciona HTTP → HTTPS mesmo em dev (mantém consistência com prod)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/transcendence.crt;
    ssl_certificate_key /etc/nginx/ssl/transcendence.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    error_page 497 =301 https://$host$request_uri;

    # Hot Module Replacement (HMR) do Next.js dev server —
    # é o mecanismo que detecta mudanças nos ficheiros e actualiza o browser
    # sem recarregar a página inteira
    location /_next/webpack-hmr {
        proxy_pass http://frontend:3000/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Rota para a futura API backend (quando o colega criar o serviço)
    # location /api/ {
    #     proxy_pass http://backend:4000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Rota WebSocket (quando o colega criar o serviço ws)
    # location /ws {
    #     proxy_pass http://ws:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # Tudo o resto vai para o Next.js
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
